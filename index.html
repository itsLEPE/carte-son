<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bowlby+One&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Globe Musical</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Geist Mono', monospace; }
#app { display: flex; width: 100vw; height: 100vh; position: relative; overflow: hidden; background: #000; }
#globe-container { flex: 1; position: relative; overflow: hidden; }

/* CURSOR AVION (SVG data URI) */
body { cursor: default; }
#globe-svg { cursor: grab; display: block; }
#globe-svg.dragging { cursor: grabbing; }

/* ZOOM SLIDER — grand, centré à gauche */
#zoom-controls {
  position: absolute; left: 30px; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  z-index: 10; user-select: none;
}
.zoom-label {
  font-size: 10px; letter-spacing: 0.12em;
  color: rgba(255,255,255,0.22); pointer-events: none;
  font-weight: 300;
}
#zoom-track {
  width: 2px; height: 280px; border-radius: 1px;
  background: rgba(255,255,255,0.18);
  position: relative; cursor: pointer;
}
#zoom-fill {
  position: absolute; bottom: 0; left: 0; right: 0;
  border-radius: 1px;
  background: transparent;
  transition: height 0.12s cubic-bezier(0.25,0.46,0.45,0.94);
}

#zoom-thumb {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 14px; height: 14px; border-radius: 50%;
  background: #fff;
  cursor: grab;
  box-shadow: 0 0 0 3px rgba(255,255,255,0.12), 0 2px 8px rgba(0,0,0,0.5);
  transition: box-shadow 0.2s, transform 0.12s;
  z-index: 2;
}
#zoom-thumb:hover {
  box-shadow: 0 0 0 6px rgba(255,255,255,0.1), 0 2px 8px rgba(0,0,0,0.5);
}
#zoom-thumb.active {
  transform: translateX(-50%) scale(1.2);
}
#zoom-comet {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 20px;
  pointer-events: none; z-index: 1;
  top: 0;
}

/* HINT */
#hint {
  position: absolute; bottom: 26px; left: 70px;
  font-size: 10px; color: rgba(255,255,255,0.15);
  pointer-events: none; letter-spacing: 0.08em; text-transform: uppercase;
}

/* DESKTOP PANEL — droite */
#panel-desktop {
  position: absolute; right: 0; top: 0; bottom: 0; width: 320px;
  pointer-events: none; display: flex; flex-direction: column;
  justify-content: center; padding: 2rem 1.75rem; z-index: 5;
}
#empty-desktop {
  font-size: 10px; text-align: right; letter-spacing: 0.12em;
  color: rgba(255,255,255,0.15); text-transform: uppercase; font-family: 'Geist Mono', monospace;
}
#info-desktop { display: none; }

.country-header {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 10px; margin-bottom: 6px;
}
.flag { display: flex; align-items: center; flex-shrink: 0; }
.flag svg { width: 30px; height: 20px; border-radius: 3px; display: block; box-shadow: 0 0 0 0.5px rgba(255,255,255,0.15); }
.country-name { font-size: 38px; font-weight: 400; text-align: right; color: rgba(255,255,255,0.95); margin-bottom: 6px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.06em; line-height: 1; }
.music-desc { font-size: 11px; line-height: 1.7; text-align: right; color: rgba(255,255,255,0.55); margin-bottom: 1.6rem; font-family: 'Geist Mono', monospace; font-weight: 300; letter-spacing: 0.02em; }
.panel-sep { width: 1px; height: 36px; background: rgba(255,255,255,0.07); margin: 0 0 1.4rem auto; }
.platform-links { display: flex; flex-direction: column; gap: 12px; align-items: flex-end; pointer-events: all; }
.platform-btn { display: flex; align-items: center; text-decoration: none; cursor: pointer; transition: opacity 0.15s, transform 0.15s; }
  .platform-btn:active { transform: scale(0.95); }
.platform-btn:hover { opacity: 0.5; }
.platform-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; background: transparent; border: 0.5px solid rgba(255,255,255,0.12); }
.platform-icon svg { width: 100%; height: 100%; display: block; }
.no-link { opacity: 0.1 !important; cursor: default; pointer-events: none; }

/* TOOLTIP */
#tooltip {
  position: absolute; border-radius: 6px; padding: 5px 11px;
  font-size: 11px; pointer-events: none; display: none; z-index: 20;
  white-space: nowrap; letter-spacing: 0.05em;
  background: rgba(8,8,8,0.92); border: 0.5px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.8);
}

  /* CURSOR AURA */
  #cursor-aura {
    position: fixed;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.06) 40%, transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 9999;
    transition: opacity 0.3s;
  }

  /* SEARCH BAR */
  #search-wrap {
    position: absolute; top: 66px; left: 28px;
    z-index: 20; display: flex; flex-direction: column; gap: 0;
  }
  #search-input {
    width: 200px; background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 8px 14px;
    font-size: 12px; color: rgba(255,255,255,0.85);
    font-family: 'Geist Mono', monospace; letter-spacing: 0.04em;
    outline: none; transition: border-color 0.2s, background 0.2s;
    caret-color: rgba(255,255,255,0.6);
  }
  #search-input::placeholder { color: rgba(255,255,255,0.2); }
  #search-input:focus {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.35);
  }
  #search-results {
    display: none; flex-direction: column;
    background: rgba(10,10,10,0.95);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-top: none; border-radius: 0 0 8px 8px;
    overflow: hidden; max-height: 220px; overflow-y: auto;
  }
  .search-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; cursor: pointer;
    transition: background 0.12s;
    font-size: 12px; color: rgba(255,255,255,0.75);
    font-family: 'Geist Mono', monospace;
  }
  .search-item:hover { background: rgba(255,255,255,0.08); }
  .search-item svg { border-radius: 2px; flex-shrink: 0; }
  .search-item-name { font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: rgba(255,255,255,0.9); letter-spacing: 0.05em; }

  #zoom-reset {
    width: 28px; height: 28px; border-radius: 50%;
    background: transparent;
    border: 0.5px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.35);
    cursor: pointer; font-size: 14px; font-weight: 300;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s;
    user-select: none; line-height: 1;
    font-family: 'Geist Mono', monospace; letter-spacing: -0.05em;
  }
  #zoom-reset:hover {
    border-color: rgba(255,255,255,0.4);
    color: rgba(255,255,255,0.7);
  }

  #app-title {
    position: absolute; top: 28px; left: 28px;
    font-family: 'Bowlby One', cursive;
    font-size: 22px; letter-spacing: 0.14em;
    color: rgba(255,255,255,0.9);
    pointer-events: none; z-index: 20;
    text-transform: uppercase;
    line-height: 1;
  }

  /* ── INTRO OVERLAY ─────────────────────────────────────────────────── */
  #intro-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    cursor: pointer;
  }
  #intro-overlay.fade-out {
    animation: introFadeOut 0.6s ease-in forwards;
    pointer-events: none;
  }
  @keyframes introFadeOut {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  #intro-globe-wrap {
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }

  /* Rotoscope ring around globe */
  #intro-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 0 30px rgba(255,255,255,0.06),
      inset 0 0 30px rgba(255,255,255,0.03);
    animation: ringPulse 3s ease-in-out infinite;
    pointer-events: none;
  }
  #intro-ring2 {
    position: absolute;
    border-radius: 50%;
    border: 0.5px solid rgba(255,255,255,0.06);
    animation: ringPulse 3s ease-in-out infinite 0.8s;
    pointer-events: none;
  }
  @keyframes ringPulse {
    0%,100% { opacity: 0.4; transform: scale(1); }
    50%      { opacity: 0.9; transform: scale(1.015); }
  }

  /* Floating CARTE SON text */
  #intro-title {
    position: absolute;
    font-family: 'Bowlby One', cursive;
    font-size: 28px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.92);
    text-shadow: 0 0 40px rgba(255,255,255,0.2);
    white-space: nowrap;
    animation: titleFloat 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes titleFloat {
    0%,100% { transform: translateY(0px);   opacity: 0.85; }
    50%      { transform: translateY(-6px);  opacity: 1; }
  }

  /* Hint text */
  #intro-hint {
    margin-top: 48px;
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    animation: hintBlink 2.5s ease-in-out infinite;
  }
  @keyframes hintBlink {
    0%,100% { opacity: 0.2; }
    50%      { opacity: 0.5; }
  }

  /* Spin out animation on click */
  #intro-globe-wrap.spin-out {
    animation: globeSpinOut 0.7s cubic-bezier(0.4,0,1,1) forwards;
  }
  @keyframes globeSpinOut {
    0%   { transform: rotate(0deg) scale(1);   opacity: 1; }
    60%  { transform: rotate(180deg) scale(1.05); opacity: 0.8; }
    100% { transform: rotate(360deg) scale(0); opacity: 0; }
  }
  #intro-title.text-blur-out {
    animation: textBlurOut 0.5s ease-in forwards;
  }
  @keyframes textBlurOut {
    0%   { filter: blur(0px);  opacity: 1;   letter-spacing: 0.22em; }
    100% { filter: blur(20px); opacity: 0;   letter-spacing: 0.6em; }
  }
  #intro-hint.hint-fade-out {
    animation: hintFade 0.3s ease-in forwards;
  }
  @keyframes hintFade { to { opacity: 0; } }

  /* WELCOME screen — phase 1: fullscreen */
  #welcome-banner {
    position: fixed; inset: 0;
    z-index: 1100;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    opacity: 0;
  }
  #welcome-banner.phase1 {
    animation: welcomeIn 2s ease-out forwards;
  }
  #welcome-banner.phase2 {
    animation: welcomeOut 0.8s ease-in forwards;
  }
  #welcome-text {
    font-family: 'Bowlby One', cursive;
    font-size: clamp(28px, 5vw, 52px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.95);
    text-shadow: 0 0 80px rgba(255,255,255,0.12);
  }
  @keyframes welcomeIn {
    0%   { opacity: 0; filter: blur(18px); }
    40%  { opacity: 0.5; filter: blur(6px); }
    100% { opacity: 1; filter: blur(0px); }
  }
  @keyframes welcomeOut {
    0%   { opacity: 1; filter: blur(0px);  transform: scale(1); }
    100% { opacity: 0; filter: blur(30px); transform: scale(0.94); }
  }

  /* Site fade-in after intro */
  #app {
    opacity: 0;
    transition: opacity 1.2s ease-in;
  }
  #app.visible {
    opacity: 1;
  }

  /* APPLE MUSIC BUTTON */
  .apple-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px;
    margin-top: 1.2rem;
    border-radius: 14px;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.1);
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    pointer-events: all;
  }
  .apple-btn:hover {
    background: rgba(255,255,255,0.09);
    border-color: rgba(255,255,255,0.2);
    transform: translateX(-3px);
  }
  .apple-btn:active { transform: translateX(-3px) scale(0.98); }
  .apple-btn-icon { width: 36px; height: 36px; flex-shrink: 0; }
  .apple-btn-icon svg { width: 100%; height: 100%; border-radius: 9px; display: block; }
  .apple-btn-text {
    display: flex; flex-direction: column; gap: 2px; flex: 1; text-align: right;
  }
  .apple-btn-label {
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.35); font-family: 'Geist Mono', monospace;
  }
  .apple-btn-name {
    font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.9);
    font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.08em;
  }
  .apple-btn-arrow {
    font-size: 16px; color: rgba(255,255,255,0.3);
    transition: color 0.2s, transform 0.2s;
  }
  .apple-btn:hover .apple-btn-arrow {
    color: rgba(255,255,255,0.7);
    transform: translateX(3px);
  }
  .apple-btn-empty { cursor: default; pointer-events: none; }

  /* COMPLETION BADGE */
  #completion {
    position: absolute; bottom: 24px; right: 24px;
    z-index: 10; text-align: right; pointer-events: all; cursor: pointer;
  }
  #completion-trigger { position: relative; }
  #completion-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.85); line-height: 1;
    transition: color 0.2s;
  }
  #completion:hover #completion-pct { color: rgba(255,255,255,1); }
  #completion-label {
    font-family: 'Geist Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.22); margin-top: 2px;
  }
  #completion-bar {
    width: 80px; height: 1px;
    background: rgba(255,255,255,0.1);
    margin-top: 6px; margin-left: auto; border-radius: 1px; overflow: hidden;
  }
  #completion-fill {
    height: 100%; background: rgba(255,255,255,0.5);
    border-radius: 1px; transition: width 0.6s ease;
  }

  /* DROPDOWN */
  #completion-dropdown {
    position: absolute; bottom: calc(100% + 12px); right: 0;
    width: 240px; max-height: 320px; overflow-y: auto;
    background: rgba(8,8,8,0.97);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 10px 0;
    display: none; flex-direction: column;
    pointer-events: all;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  #completion-dropdown.open { display: flex; }
  .dropdown-header {
    font-family: 'Geist Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.25); padding: 4px 14px 8px;
    border-bottom: 0.5px solid rgba(255,255,255,0.07); margin-bottom: 4px;
  }
  .dropdown-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 14px; cursor: pointer;
    transition: background 0.12s;
  }
  .dropdown-item:hover { background: rgba(255,255,255,0.06); }
  .dropdown-item .di-flag { width: 22px; height: 15px; flex-shrink: 0; border-radius: 2px; overflow: hidden; }
  .dropdown-item .di-flag svg { width: 100%; height: 100%; display: block; }
  .dropdown-item .di-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: 0.05em;
    color: rgba(255,255,255,0.85); flex: 1; text-align: left;
  }
  .dropdown-item .di-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    background: rgba(255,255,255,0.85);
  }
  .dropdown-section {
    font-family: 'Geist Mono', monospace;
    font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.18); padding: 8px 14px 4px;
  }

  /* PROFILE LINK */
  #profile-link {
    position: absolute; top: 22px; right: 24px;
    z-index: 20; display: flex; align-items: center; gap: 8px;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  #profile-link:hover { opacity: 0.6; }
  #profile-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #profile-avatar svg { width: 16px; height: 16px; }
  #profile-name {
    font-family: 'Geist Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }

  /* VINYL COLLECTION */
  .vinyl-section {
    margin-top: 10px;
    border-top: 0.5px solid rgba(255,255,255,0.07);
    padding-top: 10px;
    pointer-events: all;
  }
  .vinyl-toggle {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; padding: 8px 0;
    transition: opacity 0.15s;
    pointer-events: all;
    -webkit-tap-highlight-color: transparent;
  }
  .vinyl-toggle:hover { opacity: 0.7; }
  .vinyl-toggle-left {
    display: flex; align-items: center; gap: 8px;
  }
  .vinyl-icon {
    width: 18px; height: 18px; flex-shrink: 0;
    opacity: 0.6;
  }
  .vinyl-toggle-label {
    font-family: 'Geist Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }
  .vinyl-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; letter-spacing: 0.05em;
    color: rgba(255,255,255,0.5);
  }
  .vinyl-chevron {
    font-size: 10px; color: rgba(255,255,255,0.25);
    transition: transform 0.2s;
  }
  .vinyl-chevron.open { transform: rotate(180deg); }
  .vinyl-list {
    display: none; flex-direction: column; gap: 8px;
    padding-bottom: 4px;
    max-height: 260px; overflow-y: auto; overflow-x: hidden;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .vinyl-list.open { display: flex; }
  .vinyl-item {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none; cursor: pointer;
    border-radius: 8px; padding: 4px;
    margin: 0 -4px;
    transition: background 0.15s;
  }
  .vinyl-item:hover { background: rgba(255,255,255,0.05); }
  .vinyl-cover {
    width: 42px; height: 42px; border-radius: 4px;
    background: rgba(255,255,255,0.05);
    flex-shrink: 0; overflow: hidden;
    border: 0.5px solid rgba(255,255,255,0.08);
  }
  .vinyl-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .vinyl-cover-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .vinyl-info { flex: 1; min-width: 0; text-align: right; }
  .vinyl-title {
    font-family: 'Geist Mono', monospace;
    font-size: 11px; color: rgba(255,255,255,0.85);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: 0.02em;
  }
  .vinyl-artist {
    font-family: 'Geist Mono', monospace;
    font-size: 10px; color: rgba(255,255,255,0.35);
    letter-spacing: 0.02em; margin-top: 1px;
  }
  .vinyl-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px; color: rgba(255,255,255,0.2);
    letter-spacing: 0.05em; margin-top: 1px;
  }
  .vinyl-loading {
    font-family: 'Geist Mono', monospace;
    font-size: 10px; color: rgba(255,255,255,0.2);
    letter-spacing: 0.06em; text-align: center; padding: 8px 0;
  }

  .vinyl-stars {
    font-size: 9px; color: rgba(255,255,255,0.5); letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="intro-overlay">
  <div id="intro-globe-wrap">
    <div id="intro-ring"></div>
    <div id="intro-ring2"></div>
    <canvas id="intro-globe-canvas"></canvas>
    <div id="intro-title">Carte Son</div>
  </div>
  <div id="intro-hint">click or press space</div>
</div>
<div id="welcome-banner"><span id="welcome-text">Carte Son</span></div>
<div id="cursor-aura"></div>
<div id="app">
  <div id="globe-container">
    <svg id="globe-svg" width="100%" height="100%"></svg>
    <div id="tooltip"></div>
    <a id="profile-link" href="https://music.apple.com/profile/LEPE" onclick="event.preventDefault();window.location.href='music://music.apple.com/profile/LEPE'" target="_blank" rel="noopener">

const PLATFORMS=[{key:"apple",label:"Apple Music"}];

const svgEl=d3.select("#globe-svg");
const tooltipEl=document.getElementById("tooltip");
const container=document.getElementById("globe-container");
const infoDesktop=document.getElementById("info-desktop");
const emptyDesktop=document.getElementById("empty-desktop");
const trackEl=document.getElementById("zoom-track");
const thumbEl=document.getElementById("zoom-thumb");
const fillEl=document.getElementById("zoom-fill");
const TRACK_H=280;

let W,H,scale,minScale,maxScale;
let rotation=[-10,-48];
let selectedCountry=null;
let isDragging=false,lastX,lastY;
let geoFeatures=[];
let proj,pathFn;
let animating=false; // blocks click-zoom during search anim
let sliderDragging=false,shimmerTimer=null;

// ── SLIDER ────────────────────────────────────────────────────────────────────
function scaleToT(s){return Math.log(s/minScale)/Math.log(maxScale/minScale);}
function tToScale(t){return minScale*Math.pow(maxScale/minScale,t);}

function updateSliderUI(shimmer){
  const t=scaleToT(scale);
  const px=Math.max(0,Math.min(TRACK_H,t*TRACK_H));
  thumbEl.style.bottom=(px-7)+"px";
  fillEl.style.height=px+"px";
  if(shimmer){
    fillEl.classList.remove("glow");
    void fillEl.offsetWidth; // reflow
    fillEl.classList.add("glow");
    clearTimeout(shimmerTimer);
    shimmerTimer=setTimeout(()=>fillEl.classList.remove("glow"),400);
  }
}

function sliderSetFromY_unused(clientY){
  const rect=trackEl.getBoundingClientRect();
  let t=1-(clientY-rect.top)/TRACK_H;
  t=Math.max(0,Math.min(1,t));
  scale=tToScale(t);
  globeUpdate();
  updateSliderUI(true);
}

// ── COMET TRAIL ──────────────────────────────────────────────────────────────
const cometCanvas = document.getElementById("zoom-comet");
const cometCtx = cometCanvas.getContext("2d");
const COMET_W = 20;
cometCanvas.width = COMET_W;
cometCanvas.height = TRACK_H;
cometCanvas.style.height = TRACK_H + "px";

// Trail particles: each has { y, opacity, radius }
let cometParticles = [];
let cometHeadY = null; // current head position (px from top of canvas)
let cometVelocity = 0;
let cometAnimFrame = null;
let lastThumbPx = 0;

function spawnParticles(headY, dir) {
  const trailLength = 6;
  for (let i = 0; i < trailLength; i++) {
    const offset = (i / trailLength) * 18 * dir;
    cometParticles.push({
      y: headY + offset,
      opacity: (1 - i / trailLength) * 0.28,
      radius: Math.max(0.8, 2.5 * (1 - i / trailLength)),
      life: 1.0,
      decay: 0.055 + (i / trailLength) * 0.07
    });
  }
}

function drawComet() {
  cometCtx.clearRect(0, 0, COMET_W, TRACK_H);
  if (cometParticles.length === 0 && cometHeadY === null) return;

  // Draw particles (trail)
  cometParticles.forEach(p => {
    if (p.life <= 0) return;
    const grad = cometCtx.createRadialGradient(COMET_W/2, p.y, 0, COMET_W/2, p.y, p.radius * 2.5);
    grad.addColorStop(0, `rgba(255,255,255,${p.opacity * p.life})`);
    grad.addColorStop(1, `rgba(255,255,255,0)`);
    cometCtx.beginPath();
    cometCtx.arc(COMET_W/2, p.y, p.radius * 2.5, 0, Math.PI * 2);
    cometCtx.fillStyle = grad;
    cometCtx.fill();
  });

  // Draw head
  if (cometHeadY !== null) {
    const headGrad = cometCtx.createRadialGradient(COMET_W/2, cometHeadY, 0, COMET_W/2, cometHeadY, 5);
    headGrad.addColorStop(0, "rgba(255,255,255,0.5)");
    headGrad.addColorStop(0.5, "rgba(255,255,255,0.18)");
    headGrad.addColorStop(1, "rgba(255,255,255,0)");
    cometCtx.beginPath();
    cometCtx.arc(COMET_W/2, cometHeadY, 5, 0, Math.PI * 2);
    cometCtx.fillStyle = headGrad;
    cometCtx.fill();
  }

  // Decay particles
  cometParticles.forEach(p => p.life -= p.decay);
  cometParticles = cometParticles.filter(p => p.life > 0);

  cometAnimFrame = requestAnimationFrame(drawComet);
}

function startCometAnim() {
  if (!cometAnimFrame) cometAnimFrame = requestAnimationFrame(drawComet);
}
function stopCometAnim() {
  if (cometAnimFrame) { cancelAnimationFrame(cometAnimFrame); cometAnimFrame = null; }
  cometCtx.clearRect(0, 0, COMET_W, TRACK_H);
  cometHeadY = null;
}

let cometStopTimer = null;

function updateAura(newPx, oldPx) {
  if (Math.abs(newPx - oldPx) < 0.5) return;
  const dir = newPx > oldPx ? -1 : 1; // newPx is from bottom; canvas is top-down
  // Convert from bottom-px to top-px for canvas
  const headTopY = TRACK_H - newPx;
  cometHeadY = headTopY;
  spawnParticles(headTopY, dir);
  startCometAnim();
  clearTimeout(cometStopTimer);
  cometStopTimer = setTimeout(() => {
    cometHeadY = null;
    cometStopTimer = setTimeout(stopCometAnim, 600);
  }, 120);
}

function sliderSetFromYWithAura(clientY) {
  const oldPx = Math.max(0, Math.min(TRACK_H, scaleToT(scale) * TRACK_H));
  const rect = trackEl.getBoundingClientRect();
  let t = 1 - (clientY - rect.top) / TRACK_H;
  t = Math.max(0, Math.min(1, t));
  scale = tToScale(t);
  globeUpdate();
  const newPx = Math.max(0, Math.min(TRACK_H, t * TRACK_H));
  updateSliderUI(false);
  updateAura(newPx, oldPx);
  lastThumbPx = newPx;
}

thumbEl.addEventListener("mousedown",e=>{sliderDragging=true;thumbEl.classList.add("active");e.stopPropagation();e.preventDefault();});
trackEl.addEventListener("mousedown",e=>{sliderSetFromYWithAura(e.clientY);sliderDragging=true;thumbEl.classList.add("active");e.stopPropagation();});
window.addEventListener("mousemove",e=>{if(sliderDragging)sliderSetFromYWithAura(e.clientY);});
window.addEventListener("mouseup",()=>{sliderDragging=false;thumbEl.classList.remove("active");});

// ── GLOBE ─────────────────────────────────────────────────────────────────────
function buildGlobe(){
  W=container.clientWidth; H=container.clientHeight;
  minScale=Math.min(W,H)*0.40; maxScale=minScale*9;
  if(!scale)scale=minScale;
  proj=d3.geoOrthographic().scale(scale).translate([W/2,H/2]).rotate(rotation).clipAngle(90);
  pathFn=d3.geoPath().projection(proj);
  svgEl.selectAll("*").remove();
  svgEl.attr("viewBox",`0 0 ${W} ${H}`);

  svgEl.append("circle").attr("id","globe-ring")
    .attr("cx",W/2).attr("cy",H/2).attr("r",scale+1)
    .attr("fill","none").attr("stroke","rgba(255,255,255,0.07)").attr("stroke-width",5);

  svgEl.append("circle").attr("id","ocean")
    .attr("cx",W/2).attr("cy",H/2).attr("r",scale).attr("fill","#080808");

  svgEl.append("path").attr("id","grat")
    .datum(d3.geoGraticule()()).attr("d",pathFn)
    .attr("fill","none").attr("stroke","rgba(255,255,255,0.04)").attr("stroke-width",0.5);

  svgEl.selectAll(".country").data(geoFeatures).enter()
    .append("path").attr("class","country")
    .attr("d",pathFn)
    .attr("fill",d=>d.properties.name===selectedCountry?"rgba(255,255,255,0.28)":"rgba(255,255,255,0.06)")
    .attr("stroke","none").attr("stroke-width",0)
    .style("cursor","inherit")
    .on("mousemove",function(event,d){
      const n=d.properties.name;
      if(!COUNTRIES[n])return;
      tooltipEl.style.display="block";
      tooltipEl.style.left=(event.offsetX+16)+"px";
      tooltipEl.style.top=(event.offsetY-12)+"px";
      tooltipEl.textContent=COUNTRIES[n].flag+"  "+n;
      if(n!==selectedCountry)d3.select(this).attr("fill","rgba(255,255,255,0.16)");
    })
    .on("mouseleave",function(event,d){
      tooltipEl.style.display="none";
      d3.select(this).attr("fill",d.properties.name===selectedCountry?"rgba(255,255,255,0.28)":"rgba(255,255,255,0.06)");
    })
    .on("click",function(event,d){
      const n=d.properties.name;
      if(!COUNTRIES[n])return;
      if(animating) return; // ignore click during search animation
      zoomToCountry(d);
      showCountry(n);
    });

  // Internal borders only (a !== b filters out coastlines)
  svgEl.append("path").attr("id","mesh")
    .datum(topojson.mesh(window._topoWorld, window._topoWorld.objects.countries, (a,b) => a !== b))
    .attr("d", pathFn)
    .attr("fill","none")
    .attr("stroke","rgba(255,255,255,0.45)")
    .attr("stroke-width",0.35)
    .attr("stroke-linejoin","round");

  // Coastlines separately (a === b = outer border)
  svgEl.append("path").attr("id","coast")
    .datum(topojson.mesh(window._topoWorld, window._topoWorld.objects.countries, (a,b) => a === b))
    .attr("d", pathFn)
    .attr("fill","none")
    .attr("stroke","rgba(255,255,255,0.45)")
    .attr("stroke-width",0.35)
    .attr("stroke-linejoin","round");

  svgEl.append("circle").attr("id","globe-border")
    .attr("cx",W/2).attr("cy",H/2).attr("r",scale)
    .attr("fill","none").attr("stroke","rgba(255,255,255,0.22)").attr("stroke-width",0.8);

  setupInteraction();
  updateSliderUI(false);
}

function globeUpdate(){
  proj.scale(scale).translate([W/2,H/2]).rotate(rotation);
  pathFn=d3.geoPath().projection(proj);
  svgEl.select("#ocean").attr("r",scale);
  svgEl.select("#globe-ring").attr("r",scale+1);
  svgEl.select("#globe-border").attr("r",scale);
  svgEl.select("#grat").attr("d",pathFn);
  svgEl.selectAll(".country").attr("d",pathFn);
  svgEl.select("#mesh").attr("d", pathFn);
  svgEl.select("#coast").attr("d", pathFn);
}

function setupInteraction(){
  const svgNode=document.getElementById("globe-svg");
  svgEl.on("mousedown",function(e){
    if(e.target.classList.contains("country"))return;
    isDragging=true; lastX=e.clientX; lastY=e.clientY;
    svgNode.classList.add("dragging");
  });
  window.addEventListener("mousemove",function(e){
    if(!isDragging)return;
    rotation[0]+=(e.clientX-lastX)*(0.3*(minScale/scale));
    rotation[1]-=(e.clientY-lastY)*(0.3*(minScale/scale));
    rotation[1]=Math.max(-90,Math.min(90,rotation[1]));
    lastX=e.clientX; lastY=e.clientY;
    globeUpdate();
  });
  window.addEventListener("mouseup",()=>{isDragging=false;svgNode.classList.remove("dragging");});
  svgEl.on("wheel",function(e){
    e.preventDefault();
    const oldPx2 = Math.max(0, Math.min(TRACK_H, scaleToT(scale) * TRACK_H));
    scale=Math.max(minScale,Math.min(maxScale,scale*(e.deltaY>0?0.85:1.18)));
    globeUpdate(); updateSliderUI(false);
    const newPx2 = Math.max(0, Math.min(TRACK_H, scaleToT(scale) * TRACK_H));
    updateAura(newPx2, oldPx2);
  },{passive:false});

  // ZOOM RESET BUTTON
  const resetBtn = document.getElementById("zoom-reset");
  if(resetBtn){
    resetBtn.addEventListener("click", () => {
      const startScale = scale;
      const targetScale = minScale;
      const duration = 1000;
      const startTime = performance.now();
      function easeInOutCubic(t){ return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }
      (function step(now){
        const raw = Math.min(1,(now-startTime)/duration);
        scale = startScale + (targetScale-startScale)*easeInOutCubic(raw);
        scale = Math.max(minScale,Math.min(maxScale,scale));
        globeUpdate(); updateSliderUI(false);
        if(raw<1) requestAnimationFrame(step);
      })(performance.now());
    });
  }
}


// ── ZOOM TO COUNTRY ON CLICK ──────────────────────────────────────────────────
function getCountryArea(feature) {
  // Approximate area using d3.geoArea (steradians)
  return d3.geoArea(feature);
}

function zoomToCountry(feature) {
  const centroid = d3.geoCentroid(feature);
  const area = getCountryArea(feature);

  // Map area to zoom level:
  // Very small (Monaco, Luxembourg) area < 0.0001  → zoom ~6x
  // Small (Belgium, Switzerland)     area < 0.001  → zoom ~4.5x
  // Medium (France, Germany)         area < 0.01   → zoom ~3x
  // Large (Brazil, Russia)           area < 0.1    → zoom ~2x
  // Very large (Russia, Canada)      area >= 0.1   → zoom ~1.4x
  let zoomFactor;
  if      (area < 0.00005) zoomFactor = 7.0;
  else if (area < 0.0002)  zoomFactor = 5.5;
  else if (area < 0.001)   zoomFactor = 4.2;
  else if (area < 0.005)   zoomFactor = 3.2;
  else if (area < 0.02)    zoomFactor = 2.5;
  else if (area < 0.06)    zoomFactor = 2.0;
  else if (area < 0.12)    zoomFactor = 1.6;
  else                     zoomFactor = 1.3;

  const targetScale = Math.min(maxScale, minScale * zoomFactor);
  const targetRot   = [-centroid[0], -centroid[1]];

  const startRot   = [...rotation];
  const startScale = scale;
  const duration   = 1400;
  const startTime  = performance.now();

  function easeInOutCubic(t) {
    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
  }

  function step(now) {
    const raw = Math.min(1, (now - startTime) / duration);
    const t   = easeInOutCubic(raw);

    rotation[0] = startRot[0] + (targetRot[0] - startRot[0]) * t;
    rotation[1] = startRot[1] + (targetRot[1] - startRot[1]) * t;
    scale       = startScale  + (targetScale  - startScale)  * t;

    globeUpdate();
    updateSliderUI(false);

    if (raw < 1) requestAnimationFrame(step);
    else {
      rotation[0] = targetRot[0]; rotation[1] = targetRot[1];
      scale = targetScale;
      globeUpdate(); updateSliderUI(false);
    }
  }
  requestAnimationFrame(step);
}

// Fuzzy match: normalize accents, allow partial/typo matching
function normalize(str) {
  return str.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9 ]/g, "");
}

// Simple fuzzy score: checks if all chars of query appear in order in target
function fuzzyScore(query, target) {
  const q = normalize(query), t = normalize(target);
  if (t.includes(q)) return 100 - (t.indexOf(q)); // direct match = high score
  // char-by-char subsequence
  let qi = 0, score = 0;
  for (let ti = 0; ti < t.length && qi < q.length; ti++) {
    if (t[ti] === q[qi]) { score++; qi++; }
  }
  return qi === q.length ? score : 0;
}

function searchCountries(query) {
  if (!query.trim()) return [];
  return Object.keys(COUNTRIES)
    .map(name => ({ name, score: fuzzyScore(query, name) }))
    .filter(r => r.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 6)
    .map(r => r.name);
}

function selectCountryFromSearch(name) {
  const feature = geoFeatures.find(f => f.properties.name === name);
  searchInput.value = name;
  searchResults.style.display = "none";
  searchInput.blur();

  if (!feature) { showCountry(name); return; }

  // Compute target rotation and zoom in one go — no callback chain
  const centroid    = d3.geoCentroid(feature);
  const targetRot   = [-centroid[0], -centroid[1]];
  const area        = d3.geoArea(feature);
  let zoomFactor;
  if      (area < 0.00005) zoomFactor = 7.0;
  else if (area < 0.0002)  zoomFactor = 5.5;
  else if (area < 0.001)   zoomFactor = 4.2;
  else if (area < 0.005)   zoomFactor = 3.2;
  else if (area < 0.02)    zoomFactor = 2.5;
  else if (area < 0.06)    zoomFactor = 2.0;
  else if (area < 0.12)    zoomFactor = 1.6;
  else                     zoomFactor = 1.3;
  const targetScale = Math.min(maxScale, minScale * zoomFactor);

  const startRot   = [...rotation];
  const startScale = scale;
  const dist       = angularDistance(startRot, targetRot);

  animating = true;

  function easeInOutQuart(t){ return t<0.5?8*t*t*t*t:1-Math.pow(-2*t+2,4)/2; }
  function easeOutCubic(t)  { return 1-Math.pow(1-t,3); }

  if (dist < 45) {
    // SHORT: smooth pan + zoom in one pass
    const dur = 1000 + dist * 8;
    const t0  = performance.now();
    (function step(now){
      const raw = Math.min(1,(now-t0)/dur);
      const t   = easeInOutQuart(raw);
      rotation[0] = startRot[0]+(targetRot[0]-startRot[0])*t;
      rotation[1] = startRot[1]+(targetRot[1]-startRot[1])*t;
      scale        = startScale+(targetScale-startScale)*easeOutCubic(raw);
      scale        = Math.max(minScale,Math.min(maxScale,scale));
      globeUpdate(); updateSliderUI(false);
      if(raw<1){ requestAnimationFrame(step); }
      else { rotation[0]=targetRot[0];rotation[1]=targetRot[1];scale=targetScale;globeUpdate();updateSliderUI(false);showCountry(name);animating=false; }
    })(t0);

  } else {
    // LONG: dezoom → rotate → rezoom, all in one animation loop
    const midScale   = Math.max(minScale, minScale*1.1);
    const dezoomDur  = 500;
    const rotateDur  = 1400 + Math.min(dist*3.5, 900);
    const pauseDur   = 200;
    const rezoomDur  = 1100;
    const total      = dezoomDur+rotateDur+pauseDur+rezoomDur;
    const t0         = performance.now();

    (function step(now){
      const elapsed = now-t0;
      if(elapsed < dezoomDur){
        const t = easeOutCubic(elapsed/dezoomDur);
        scale = startScale+(midScale-startScale)*t;
        scale = Math.max(minScale,Math.min(maxScale,scale));
        globeUpdate(); updateSliderUI(false);
        requestAnimationFrame(step);
      } else if(elapsed < dezoomDur+rotateDur){
        const t = easeInOutQuart((elapsed-dezoomDur)/rotateDur);
        rotation[0] = startRot[0]+(targetRot[0]-startRot[0])*t;
        rotation[1] = startRot[1]+(targetRot[1]-startRot[1])*t;
        scale = midScale;
        globeUpdate(); updateSliderUI(false);
        requestAnimationFrame(step);
      } else if(elapsed < dezoomDur+rotateDur+pauseDur){
        rotation[0]=targetRot[0]; rotation[1]=targetRot[1]; scale=midScale;
        globeUpdate(); requestAnimationFrame(step);
      } else if(elapsed < total){
        const t = easeOutCubic((elapsed-dezoomDur-rotateDur-pauseDur)/rezoomDur);
        scale = midScale+(targetScale-midScale)*t;
        scale = Math.max(minScale,Math.min(maxScale,scale));
        globeUpdate(); updateSliderUI(false);
        requestAnimationFrame(step);
      } else {
        rotation[0]=targetRot[0]; rotation[1]=targetRot[1]; scale=targetScale;
        globeUpdate(); updateSliderUI(false);
        showCountry(name); animating=false;
      }
    })(t0);
  }
}

function angularDistance(r1, r2) {
  // Great-circle distance between two rotation targets (degrees)
  const toRad = d => d * Math.PI / 180;
  const lat1 = toRad(-r1[1]), lon1 = toRad(-r1[0]);
  const lat2 = toRad(-r2[1]), lon2 = toRad(-r2[0]);
  const dlat = lat2 - lat1, dlon = lon2 - lon1;
  const a = Math.sin(dlat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dlon/2)**2;
  return 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * 180 / Math.PI;
}

function animateRotation(target, callback) {
  const startRot   = [...rotation];
  const startScale = scale;
  const targetScale = Math.min(maxScale, minScale * 3.2);
  const dist = angularDistance(startRot, target);

  // SHORT distance (< 45°): keep current zoom, just pan smoothly
  if (dist < 45) {
    const duration = 900 + dist * 8; // faster for closer countries
    const startTime = performance.now();
    function easeInOut(t){ return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }
    function stepShort(now) {
      const raw = Math.min(1, (now - startTime) / duration);
      const t = easeInOut(raw);
      rotation[0] = startRot[0] + (target[0] - startRot[0]) * t;
      rotation[1] = startRot[1] + (target[1] - startRot[1]) * t;
      globeUpdate();
      if (raw < 1) requestAnimationFrame(stepShort);
      else { rotation[0]=target[0]; rotation[1]=target[1]; globeUpdate(); if(callback) callback(); }
    }
    requestAnimationFrame(stepShort);
    return;
  }

  // LONG distance (>= 45°): dezoom → rotate → rezoom
  const midScale   = Math.max(minScale, minScale * 1.1); // almost full out
  const dezoomDur  = 600;
  const rotateDur  = 1600 + Math.min(dist * 4, 800);    // proportional to distance
  const pauseDur   = 250;
  const rezoomDur  = 1200;
  const total      = dezoomDur + rotateDur + pauseDur + rezoomDur;
  const startTime  = performance.now();

  function easeOutCubic(t)   { return 1 - Math.pow(1-t, 3); }
  function easeInOutQuart(t) { return t<0.5 ? 8*t*t*t*t : 1-Math.pow(-2*t+2,4)/2; }
  function easeInCubic(t)    { return t*t*t; }

  function stepLong(now) {
    const elapsed = now - startTime;

    if (elapsed < dezoomDur) {
      // Phase 1: dezoom smoothly
      const t = easeOutCubic(elapsed / dezoomDur);
      scale = startScale + (midScale - startScale) * t;
      scale = Math.max(minScale, Math.min(maxScale, scale));
      globeUpdate(); updateSliderUI(false);
      requestAnimationFrame(stepLong);

    } else if (elapsed < dezoomDur + rotateDur) {
      // Phase 2: rotate at dezoom level
      const t = easeInOutQuart((elapsed - dezoomDur) / rotateDur);
      rotation[0] = startRot[0] + (target[0] - startRot[0]) * t;
      rotation[1] = startRot[1] + (target[1] - startRot[1]) * t;
      scale = midScale;
      globeUpdate(); updateSliderUI(false);
      requestAnimationFrame(stepLong);

    } else if (elapsed < dezoomDur + rotateDur + pauseDur) {
      // Pause
      rotation[0] = target[0]; rotation[1] = target[1];
      scale = midScale;
      globeUpdate();
      requestAnimationFrame(stepLong);

    } else if (elapsed < total) {
      // Phase 3: rezoom gently
      const t = easeOutCubic((elapsed - dezoomDur - rotateDur - pauseDur) / rezoomDur);
      scale = midScale + (targetScale - midScale) * t;
      scale = Math.max(minScale, Math.min(maxScale, scale));
      globeUpdate(); updateSliderUI(false);
      requestAnimationFrame(stepLong);

    } else {
      rotation[0] = target[0]; rotation[1] = target[1];
      scale = targetScale;
      globeUpdate(); updateSliderUI(false);
      if (callback) callback();
    }
  }
  requestAnimationFrame(stepLong);
}

  const introPrj  = d3.geoOrthographic()
    .scale(R - 2).translate([R, R]).rotate(introRot).clipAngle(90);
  const introPath = d3.geoPath().projection(introPrj);

  // Build globe layers
  svgIntro.append("circle").attr("id","ig-ring2")
    .attr("cx",R).attr("cy",R).attr("r",R+1)

  svgIntro.append("circle")
    .attr("cx",R).attr("cy",R).attr("r",R-1).attr("fill","#080808");

  svgIntro.append("path").attr("id","ig-grat")
    .datum(d3.geoGraticule()())
    .attr("fill","none").attr("stroke","rgba(255,255,255,0.05)").attr("stroke-width",0.5);

  svgIntro.append("g").attr("id","ig-countries");

  svgIntro.append("circle").attr("id","ig-border")
    .attr("cx",R).attr("cy",R).attr("r",R-1)
    .attr("fill","none").attr("stroke","rgba(255,255,255,0.22)").attr("stroke-width",0.8);



  // defs not needed without arc text

  // no arc text on intro globe

  let introRAF = null;
  let dismissed = false;
  let geoLoaded = false;

  function updateIntroGlobe() {
    introPath.projection(introPrj.rotate(introRot));
    svgIntro.select("#ig-grat").attr("d", introPath);
    svgIntro.select("#ig-countries").selectAll("path").attr("d", introPath);
  }

  function animateIntro() {
    introRot[0] += 0.18;
    introPrj.rotate(introRot);
    updateIntroGlobe();
    introRAF = requestAnimationFrame(animateIntro);
  }

  // Load geo data (reuse if already loaded)
  function startIntro(features) {
    const countries = svgIntro.select("#ig-countries");
    countries.selectAll("path")
      .data(features).enter().append("path")
      .attr("fill","rgba(255,255,255,0.07)")
      .attr("stroke","rgba(255,255,255,0.5)")
      .attr("stroke-width","0.35");
    updateIntroGlobe();
    animateIntro();

  if (geoFeatures.length) {
    startIntro(geoFeatures);

    // Wait for main globe data to load
    const waitGeo = setInterval(() => {
      if (geoFeatures.length) { clearInterval(waitGeo); startIntro(geoFeatures); }
    }, 100);
  }

  function dismiss() {
    if (dismissed) return;
    dismissed = true;

    hintEl.classList.add("hint-fade-out");
    cancelAnimationFrame(introRAF);

    // Phase 1: progressive acceleration — 2200ms ramp, then fade globe
    let speed = 0.18;
    let t0 = performance.now();
    let globeOpacity = 1;
    const ACCEL_DUR  = 2200; // ms to reach max speed
    const FADE_START = 1800; // ms before starting fade
    const FADE_DUR   = 600;

    function fastSpin(now) {
      const elapsed = now - t0;
      // Ease-in acceleration on longitude axis only
      const accelT = Math.min(elapsed / ACCEL_DUR, 1);
      speed = 0.18 + accelT * accelT * 16; // quadratic ease-in to ~16deg/frame
      introRot[0] += speed;
      introPrj.rotate(introRot);
      updateIntroGlobe();

      // Fade globe out after FADE_START
      if (elapsed > FADE_START) {
        globeOpacity = Math.max(0, 1 - (elapsed - FADE_START) / FADE_DUR);
        svgIntro.style("opacity", globeOpacity);
        hintEl.style.opacity = globeOpacity * 0.4;
      }

      if (globeOpacity > 0) {
        requestAnimationFrame(fastSpin);
      } else {
        // Globe faded — overlay stays black, show CARTE SON
        svgIntro.style("display","none");
        overlay.style.background = "#000";
        overlay.style.opacity    = "1";

        // Show CARTE SON fullscreen on black
        welcome.style.display = "flex";
        welcome.style.opacity  = "0";
        // Force reflow before adding class
        void welcome.offsetWidth;
        welcome.classList.add("phase1");

        // After CARTE SON is visible, fade site in behind
        setTimeout(() => {
          overlay.style.display = "none";
          document.getElementById("app").classList.add("visible");
        }, 1800);

        // Then fade CARTE SON out
        setTimeout(() => {
          welcome.classList.remove("phase1");
          welcome.classList.add("phase2");
          setTimeout(() => {
            welcome.style.display = "none";
          }, 1000);
        }, 3200);
      }
    }
    requestAnimationFrame(fastSpin);
  }

  overlay.addEventListener("click", dismiss);
  document.addEventListener("keydown", e => {
    if (e.code === "Space" && !dismissed) { e.preventDefault(); dismiss(); }
  });
})();


// ── IDLE AUTO-SPIN ────────────────────────────────────────────────────────────
(function(){
  const IDLE_DELAY  = 5000;  // 5s inactivity
  const IDLE_SPEED  = 0.12;  // degrees per frame — slow and elegant
  const ZOOM_THRESH = 1.05;  // must be at most 5% above minScale

  let idleTimer   = null;
  let idleRAF     = null;
  let isIdleSpinning = false;

  function isAtMinZoom() {
    return scale <= minScale * ZOOM_THRESH;
  }

  function startIdleSpin() {
    if (isIdleSpinning) return;
    if (!isAtMinZoom()) return;
    isIdleSpinning = true;

    function spinStep() {
      if (!isIdleSpinning) return;
      rotation[0] += IDLE_SPEED;
      globeUpdate();
      idleRAF = requestAnimationFrame(spinStep);
    }
    idleRAF = requestAnimationFrame(spinStep);
  }

  function stopIdleSpin() {
    if (!isIdleSpinning) return;
    isIdleSpinning = false;
    cancelAnimationFrame(idleRAF);
    idleRAF = null;
  }

  window.resetIdleTimer = function resetIdleTimer() {
    stopIdleSpin();
    clearTimeout(idleTimer);
    // Only schedule idle spin if at min zoom
    if (isAtMinZoom()) {
      idleTimer = setTimeout(startIdleSpin, IDLE_DELAY);
    }
  };

  // Listen to all user interactions
  ["mousemove","mousedown","wheel","keydown","touchstart","touchmove"].forEach(evt => {
    window.addEventListener(evt, window.resetIdleTimer, { passive: true });
  });

  // Also stop spin immediately on any interaction
  ["mousedown","wheel","keydown","touchstart"].forEach(evt => {
    window.addEventListener(evt, stopIdleSpin, { passive: true });
  });

  // When zoom changes (e.g. after click-zoom), re-evaluate
  const origGlobeUpdate = globeUpdate;
  window._checkIdleZoom = function() {
    if (!isAtMinZoom()) {
      stopIdleSpin();
      clearTimeout(idleTimer);
    }
  };

  // Check zoom after each globeUpdate via interval (lightweight)
  setInterval(() => {
    if (isIdleSpinning && !isAtMinZoom()) stopIdleSpin();
  }, 500);

  // Kick off the initial timer
  resetIdleTimer();
})();

function updateCompletion() {
  const total    = Object.keys(COUNTRIES).length;
  const done     = Object.keys(COUNTRIES).filter(n => COUNTRIES[n].links.apple || COUNTRIES[n].links.soundcloud);
  const notDone  = Object.keys(COUNTRIES).filter(n => !COUNTRIES[n].links.apple);
  const pct      = Math.round((done.length / total) * 100);

  document.getElementById("completion-pct").textContent  = pct + "%";
  document.getElementById("completion-fill").style.width = pct + "%";

  // Build dropdown
  const dd = document.getElementById("completion-dropdown");
  let html = `<div class="dropdown-header">${done.length} / ${total} pays complétés</div>`;

  if(done.length > 0){
    html += `<div class="dropdown-section">✓ Complétés</div>`;
    done.sort().forEach(name => {
      const flag = FLAGS[name] ? `<span class="di-flag">${FLAGS[name]}</span>` : "";
      html += `<div class="dropdown-item" data-country="${name}">
        ${flag}
        <span class="di-name">${name}</span>
        <span class="di-dot"></span>
      </div>`;
    });
  }

  if(notDone.length > 0 && done.length > 0){
    html += `<div class="dropdown-section">— À compléter</div>`;
    notDone.sort().forEach(name => {
      const flag = FLAGS[name] ? `<span class="di-flag">${FLAGS[name]}</span>` : "";
      html += `<div class="dropdown-item" data-country="${name}" style="opacity:0.35">
        ${flag}
        <span class="di-name">${name}</span>
      </div>`;
    });
  }

  dd.innerHTML = html;

  // Click on item → navigate to country
  dd.querySelectorAll(".dropdown-item").forEach(el => {
    el.addEventListener("click", e => {
      e.stopPropagation();
      const name = el.dataset.country;
      dd.classList.remove("open");
      selectCountryFromSearch(name);
    });
  });
}

const DISCOGS_USER  = "itsLEPE";
const DISCOGS_TOKEN = "yioBldDgYppeBcaesrdNdXPTPFYHZgDYOjqxObpf";
let discogsCache = null; // full collection cache

async function fetchDiscogsCollection() {
  if (discogsCache) return discogsCache;
  // Fetch collection with notes — country is in notes field
  // Format: "Country : France | stars:4"
  let all = [], page = 1, pages = 1;
  while (page <= pages) {
    const apiUrl = `https://api.discogs.com/users/${DISCOGS_USER}/collection/folders/0/releases?token=${DISCOGS_TOKEN}&per_page=100&page=${page}`;
    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(apiUrl)}`);
    const data = await res.json();
    pages = data.pagination.pages;
    all = all.concat(data.releases);
    page++;
  }

  // Parse country and stars from notes field
  // Discogs notes is an array of {field_id, value} objects
  all.forEach(r => {
    let notesText = "";
    if (typeof r.notes === "string") {
      notesText = r.notes;
    } else if (Array.isArray(r.notes)) {
      notesText = r.notes.map(n => n.value || "").join(" ");
    }
    const countryMatch = notesText.match(/country\s*:\s*([^|\n,]+)/i);
    if (countryMatch) r.basic_information.country = countryMatch[1].trim();
    const starsMatch = notesText.match(/stars\s*:\s*(\d)/i);
    r.basic_information.stars = starsMatch ? parseInt(starsMatch[1]) : null;
    console.log("📀", r.basic_information.title, "| notes:", notesText, "| country:", r.basic_information.country);
  });

  discogsCache = all;
  const found = [...new Set(all.map(r => r.basic_information.country || "N/A"))].sort();
  console.log("🎵 Countries from notes:", found);
  console.log("🎵 Total:", all.length);
  return all;
}

// Map Discogs country names to our COUNTRIES keys
function normalizeCountry(dc) {
  const map = {
    "France": "France", "UK": "United Kingdom", "US": "United States",
    "Germany": "Germany", "Italy": "Italy", "Japan": "Japan",
    "Netherlands": "Netherlands", "Belgium": "Belgium", "Spain": "Spain",
    "Sweden": "Sweden", "Norway": "Norway", "Denmark": "Denmark",
    "Australia": "Australia", "Canada": "Canada", "Brazil": "Brazil",
    "Argentina": "Argentina", "Portugal": "Portugal", "Switzerland": "Switzerland",
    "Austria": "Austria", "Greece": "Greece", "Poland": "Poland",
    "Czech Republic": "Czech Republic", "Hungary": "Hungary",
    "South Africa": "South Africa", "Nigeria": "Nigeria",
    "South Korea": "South Korea", "Taiwan": "Taiwan",
    "Colombia": "Colombia", "Mexico": "Mexico", "Jamaica": "Jamaica",
    "Ireland": "Ireland", "New Zealand": "New Zealand",
  };
  return map[dc] || dc;
}

async function getVinylsForCountry(countryName) {
  const all = await fetchDiscogsCollection();
  return all.filter(r => {
    const dc = r.basic_information.country || "";
    return normalizeCountry(dc) === countryName;
  }).map(r => ({
    title:  r.basic_information.title,
    artist: r.basic_information.artists[0]?.name || "?",
    year:   r.basic_information.year,
    cover:  r.basic_information.cover_image,
    stars:  r.basic_information.stars
  }));
}
